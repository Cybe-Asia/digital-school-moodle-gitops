apiVersion: apps/v1
kind: Deployment
metadata:
  name: otp-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: otp-service
  template:
    metadata:
      labels:
        app: otp-service
    spec:
      imagePullSecrets:
        - name: ghcr-secret
      nodeSelector:
        kubernetes.io/hostname: cybe-dell-r250-01
      containers:
        - name: otp-service
          image: ghcr.io/cybe-asia/otp-services
          imagePullPolicy: Always
          ports:
            - containerPort: 8084
          env:
            - name: SERVER_PORT
              value: "8084"
            - name: NEO4J_URI
              value: "neo4j://neo4j.school-dev.svc.cluster.local:7687"
            - name: NEO4J_USER
              value: "neo4j"
            - name: NEO4J_PASSWORD
              value: "password123"
