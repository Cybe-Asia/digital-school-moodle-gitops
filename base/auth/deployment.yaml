apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: auth-service
  template:
    metadata:
      labels:
        app: auth-service
    spec:
      imagePullSecrets:
        - name: ghcr-secret
      nodeSelector:
        kubernetes.io/hostname: cybe-dell-r250-01
      containers:
        - name: auth-service
          image: ghcr.io/cybe-asia/auth-services
          imagePullPolicy: Always
          ports:
            - containerPort: 8083
          env:
            - name: SERVER_PORT
              value: "8083"
            - name: NEO4J_URI
              value: "neo4j://neo4j.school-dev.svc.cluster.local:7687"
            - name: NEO4J_USER
              value: "neo4j"
            - name: NEO4J_PASSWORD
              value: "password123"
            - name: JWT_SECRET
              value: "mysecretkey"
            - name: GOOGLE_TOKENINFO_ENDPOINT
              value: "https://oauth2.googleapis.com/tokeninfo"
