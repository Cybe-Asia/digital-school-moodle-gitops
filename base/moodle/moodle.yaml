# Moodle LMS (PHP 8.2 + Apache) — the admissions assessment engine.
# Image is built from digital-school-moodle repo and pushed to GHCR
# (same cadence as the app microservices).
#
# Static config — `moodle-config` + `moodle-apache-vhost` +
# `moodle-php-ini` ConfigMaps — is NOT declared inline here.
# It's produced by `configMapGenerator` in kustomization.yaml
# from files under `base/moodle/config/`. The generator appends
# a content-hash to each ConfigMap name (e.g. moodle-config-a1b2c3)
# which means:
#   - Any byte-level edit produces a fresh ConfigMap name
#   - Kustomize rewrites all name references (Deployment volumes,
#     the brand-init Job) to the new name
#   - Kubernetes sees the Deployment template change and rolls the
#     pod automatically — no manual `kubectl rollout restart`
#
# Per-env overrides still come from each overlay's
# moodle-wwwroot-patch.yaml (sets MOODLE_WWWROOT env var) and
# moodle-ingress.yaml.
#
# wwwroot behavior:
#   - Picked up dynamically from $_SERVER['HTTP_HOST'] (and the
#     X-Forwarded-Proto header from Traefik for https).
#   - Fallback (used during CLI install) is the per-env hostname
#     written by the overlay patch.
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: moodle-pvc
spec:
  accessModes: [ReadWriteOnce]
  storageClassName: local-path
  resources:
    requests:
      storage: 10Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: moodle
spec:
  replicas: 1
  # Single-writer PVC — Recreate avoids deadlock on rolling update.
  # Acceptable downtime window is ~20 s on image roll (Moodle boots fast).
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: moodle
  template:
    metadata:
      labels:
        app: moodle
    spec:
      imagePullSecrets:
        - name: ghcr-secret
      containers:
        - name: moodle
          image: ghcr.io/cybe-asia/digital-school-moodle:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 80
          env:
            # DB credentials exposed to PHP via getenv() in config.php.
            # Values come from the per-env sealed `moodle-mariadb-secret`.
            - name: MOODLE_DB_PASS
              valueFrom:
                secretKeyRef:
                  name: moodle-mariadb-secret
                  key: MYSQL_PASSWORD
            # MOODLE_WWWROOT is set per-env via overlay patch so CLI
            # tools (install, cron) know the canonical URL. The live
            # HTTP path still reads HTTP_HOST dynamically.
            - name: MOODLE_WWWROOT
              value: http://placeholder-overridden-per-env.invalid
          volumeMounts:
            - mountPath: /var/moodledata
              name: moodledata
            - mountPath: /var/www/html/config.php
              name: moodle-config
              subPath: config.php
            - mountPath: /etc/apache2/sites-available/000-default.conf
              name: apache-vhost
              subPath: 000-default.conf
            - mountPath: /usr/local/etc/php/conf.d/zz-moodle.ini
              name: moodle-php-ini
              subPath: zz-moodle.ini
      volumes:
        - name: moodledata
          persistentVolumeClaim:
            claimName: moodle-pvc
        - name: moodle-config
          configMap:
            name: moodle-config
        - name: apache-vhost
          configMap:
            name: moodle-apache-vhost
        - name: moodle-php-ini
          configMap:
            name: moodle-php-ini
---
apiVersion: v1
kind: Service
metadata:
  name: moodle
spec:
  selector:
    app: moodle
  ports:
    - name: http
      port: 80
      targetPort: 80
  type: ClusterIP
