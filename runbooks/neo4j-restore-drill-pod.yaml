# Reusable scratch pod for the Neo4j restore drill.
# See runbooks/neo4j-restore-drill.md for the full procedure.
# Adjust metadata.namespace before applying.
apiVersion: v1
kind: Pod
metadata:
  name: neo4j-restore-drill
  namespace: school-dev
  labels:
    purpose: restore-drill
spec:
  restartPolicy: Never
  # Disable auto-injected service env vars; Neo4j 5.x strict_validation
  # rejects them.
  enableServiceLinks: false
  containers:
    - name: neo4j
      image: neo4j:5.15
      env:
        - name: NEO4J_AUTH
          value: neo4j/drilltest123
        - name: NEO4J_PLUGINS
          value: '["apoc"]'
        - name: NEO4J_dbms_security_procedures_unrestricted
          value: "apoc.*"
        - name: NEO4J_server_config_strict__validation_enabled
          value: "false"
        - name: NEO4J_apoc_import_file_use__neo4j__config
          value: "false"
        - name: NEO4J_dbms_memory_heap_initial__size
          value: 256m
        - name: NEO4J_dbms_memory_heap_max__size
          value: 512m
      ports:
        - containerPort: 7687
      readinessProbe:
        tcpSocket:
          port: 7687
        initialDelaySeconds: 30
        periodSeconds: 5
        failureThreshold: 20
      resources:
        requests:
          cpu: 200m
          memory: 768Mi
        limits:
          cpu: 500m
          memory: 1Gi
