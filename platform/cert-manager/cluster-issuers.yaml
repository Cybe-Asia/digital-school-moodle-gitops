# ClusterIssuers available to the whole cluster.
#
# `selfsigned-root` — bootstraps the lab CA. It signs the `lab-ca`
#    Certificate which becomes the authoritative CA for the lab.
#    Not used directly by workloads.
#
# `lab-ca` — the Issuer workloads should use for internal certs.
#    Signs everything under *.lab.cybe.tech. Browsers will warn
#    'not trusted' on first visit; acceptable for a lab.
#
# `letsencrypt-prod` — placeholder for Phase 2 when lab.cybe.tech
#    becomes publicly resolvable. Uncomment + supply an email.
#    For prod (cybe.tech on the separate cybe-prod cluster), use
#    a fresh ClusterIssuer there, not this one.

---
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: selfsigned-root
spec:
  selfSigned: {}

---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: lab-ca
  namespace: cert-manager
spec:
  isCA: true
  commonName: "Cybe Lab Root CA"
  secretName: lab-ca-key-pair
  duration: 87600h  # 10 years
  renewBefore: 2160h  # 90 days
  privateKey:
    algorithm: ECDSA
    size: 256
  issuerRef:
    name: selfsigned-root
    kind: ClusterIssuer
    group: cert-manager.io

---
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: lab-ca
spec:
  ca:
    secretName: lab-ca-key-pair

