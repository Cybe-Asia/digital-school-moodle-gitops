# Unleash UI ingress at unleash.cybe.tech.
#
# Same pattern as grafana.cybe.tech / argo.cybe.tech:
#   host nginx (port 8443, TLS via wildcard cert) → NodePort 32118
#   → Traefik → this Ingress → unleash Service (port 4242).
#
# Admin action required after this is applied:
#   1. Add DNS A record: unleash.cybe.tech → cybe server IP
#   2. Add host nginx config at /etc/nginx/sites-available/unleash.cybe.tech
#      (see docs/feature-flags.md for the template)
#   3. nginx -t && systemctl reload nginx
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: unleash
  namespace: unleash
  annotations:
    # Rate-limit the admin UI — brute force protection.
    # (Traefik middleware. Burst 20, average 5 req/s).
    traefik.ingress.kubernetes.io/router.middlewares: unleash-unleash-ratelimit@kubernetescrd
spec:
  ingressClassName: traefik
  rules:
    - host: unleash.cybe.tech
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: unleash
                port:
                  number: 4242
---
# Traefik Middleware — rate limit for admin UI.
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: unleash-ratelimit
  namespace: unleash
spec:
  rateLimit:
    average: 5
    burst: 20
