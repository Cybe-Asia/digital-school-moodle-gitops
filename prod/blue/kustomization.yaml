apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: school-prod-blue

# NOTE: app-secrets-sealed.yaml and neo4j-secret-sealed.yaml are
# intentionally missing. They must be sealed against the prod cluster's
# sealed-secrets controller before first deploy. See
# runbooks/prod-first-deploy.md. Kustomize build will fail until those
# files land — this is deliberate; prod must not roll out with
# placeholder secrets.

resources:
- namespace.yaml
- ../../base/admission
- ../../base/auth
- ../../base/notification
- ../../base/otp
- ../../base/frontend
- ../../base/neo4j
- ../../base/governance
- ingress.yaml
- resource-quota.yaml
- app-config.yaml
- app-secrets-sealed.yaml
- neo4j-secret-sealed.yaml
- pdbs.yaml

# Moodle LMS: admissions-test engine + future student learning.
# Base at base/moodle/; overlay adds per-env ingress + sealed DB secret.
# Post-deploy one-time install (see runbooks/moodle-first-deploy.md):
#   kubectl -n <ns> exec deploy/moodle -- \
#     php /var/www/html/admin/cli/install_database.php --agree-license ...
- ../../base/moodle
- moodle-ingress.yaml
- moodle-mariadb-secret-sealed.yaml
- moodle-frontend-secret-sealed.yaml

replicas:
- name: admission-service
  count: 3
- name: auth-service
  count: 3
- name: notification-service
  count: 3
- name: otp-service
  count: 3
- name: frontend
  count: 3

patches:
- patch: |-
    # Feature flags (Unleash) — bound to the PRODUCTION Unleash
    # environment. All flags default OFF unless explicitly enabled in
    # the Unleash UI for environment=production.
    - op: add
      path: /spec/template/spec/containers/0/env/-
      value:
        name: UNLEASH_URL
        value: "https://unleash.cybe.tech:8443/api/frontend"
    - op: add
      path: /spec/template/spec/containers/0/env/-
      value:
        name: UNLEASH_ENVIRONMENT
        value: "production"
    - op: add
      path: /spec/template/spec/containers/0/env/-
      value:
        name: UNLEASH_FRONTEND_TOKEN
        valueFrom:
          secretKeyRef:
            name: unleash-frontend-token
            key: token
            optional: true
  target:
    kind: Deployment
    name: frontend

# MOODLE_WWWROOT canonical URL for Moodle CLI (install, cron).
- patch: |-
    - op: replace
      path: /spec/template/spec/containers/0/env/1/value
      value: http://school-prod-blue-moodle.cybe.tech
  target:
    kind: Deployment
    name: moodle

# Moodle LMS integration for the admissions online-test flow. Wires
# the frontend pod to the in-cluster Moodle instance in this env.
- patch: |-
    - op: add
      path: /spec/template/spec/containers/0/env/-
      value:
        name: MOODLE_INTERNAL_URL
        value: http://moodle:80
    - op: add
      path: /spec/template/spec/containers/0/env/-
      value:
        name: MOODLE_PUBLIC_URL
        value: http://school-moodle.cybe.tech
    - op: add
      path: /spec/template/spec/containers/0/env/-
      value:
        name: MOODLE_IIHS_COURSE_ID
        value: 2
    - op: add
      path: /spec/template/spec/containers/0/env/-
      value:
        name: MOODLE_IIHS_QUIZ_CMID
        value: 3
    - op: add
      path: /spec/template/spec/containers/0/env/-
      value:
        name: MOODLE_IISS_COURSE_ID
        value: 3
    - op: add
      path: /spec/template/spec/containers/0/env/-
      value:
        name: MOODLE_IISS_QUIZ_CMID
        value: 4
    - op: add
      path: /spec/template/spec/containers/0/env/-
      value:
        name: MOODLE_API_TOKEN
        valueFrom:
          secretKeyRef:
            name: moodle-frontend-secret
            key: MOODLE_API_TOKEN
    - op: add
      path: /spec/template/spec/containers/0/env/-
      value:
        name: MOODLE_STUDENT_PASSWORD_SALT
        valueFrom:
          secretKeyRef:
            name: moodle-frontend-secret
            key: MOODLE_STUDENT_PASSWORD_SALT
  target:
    kind: Deployment
    name: frontend

# Moodle integration for admission-service. Reuses moodle-frontend-secret
# (same API token + salt as the frontend pod). Without these the new
# /me/students/:id/online-test/sync endpoint returns 501.
- patch: |-
    - op: add
      path: /spec/template/spec/containers/0/env/-
      value:
        name: MOODLE_INTERNAL_URL
        value: http://moodle:80
    - op: add
      path: /spec/template/spec/containers/0/env/-
      value:
        name: MOODLE_PUBLIC_URL
        value: http://school-moodle.cybe.tech
    - op: add
      path: /spec/template/spec/containers/0/env/-
      value:
        name: MOODLE_IIHS_COURSE_ID
        value: 2
    - op: add
      path: /spec/template/spec/containers/0/env/-
      value:
        name: MOODLE_IISS_COURSE_ID
        value: 3
    - op: add
      path: /spec/template/spec/containers/0/env/-
      value:
        name: MOODLE_API_TOKEN
        valueFrom:
          secretKeyRef:
            name: moodle-frontend-secret
            key: MOODLE_API_TOKEN
  target:
    kind: Deployment
    name: admission-service

images:
# Image tags default to current lab/staging pins. In practice, the
# prod cutover procedure bumps these to the release candidate digest
# via a separate PR once staging smoke tests pass.
- name: ghcr.io/cybe-asia/admission-services
  newName: ghcr.io/cybe-asia/admission-services
  newTag: sha-3e922d7
- name: ghcr.io/cybe-asia/auth-services
  newName: ghcr.io/cybe-asia/auth-services
  newTag: sha-5fe395a
- name: ghcr.io/cybe-asia/digital-school-frontend
  newName: ghcr.io/cybe-asia/digital-school-frontend
  newTag: sha-cf5f2b3
- name: ghcr.io/cybe-asia/notification-services
  newName: ghcr.io/cybe-asia/notification-services
  newTag: sha-3ca3b7f
- name: ghcr.io/cybe-asia/otp-services
  newName: ghcr.io/cybe-asia/otp-services
  newTag: sha-ad733cd
