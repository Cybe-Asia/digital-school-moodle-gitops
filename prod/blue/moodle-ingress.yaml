# Moodle ingress for school-prod-blue. Hostname is env-specific. Public DNS
# A record points school-prod-blue-moodle.cybe.tech to the cluster's external IP.
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: moodle-ingress
  namespace: school-prod-blue
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: web
spec:
  ingressClassName: traefik
  rules:
    - host: school-prod-blue-moodle.cybe.tech
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: moodle
                port:
                  number: 80
