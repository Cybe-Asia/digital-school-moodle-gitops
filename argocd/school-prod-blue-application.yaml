# Template. Apply only after:
#   1. cybe-prod cluster exists
#   2. prod/blue/app-secrets-sealed.yaml + neo4j-secret-sealed.yaml
#      have been sealed against the prod cluster's controller cert
# See runbooks/prod-first-deploy.md.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: school-prod-blue-services
  namespace: platform-system
spec:
  project: default
  source:
    repoURL: https://github.com/Cybe-Asia/digital-school-gitops.git
    targetRevision: main
    path: prod/blue
  destination:
    server: https://kubernetes.default.svc
    namespace: school-prod-blue
  syncPolicy:
    automated:
      # Auto-sync ON. Merging a PR to prod/blue/kustomization.yaml triggers
      # a deployment within ~3 min without requiring `argocd app sync`.
      # Gate is now the PR + CODEOWNERS review only — no separate sync click.
      # selfHeal=true catches any manual drift (kubectl apply outside gitops)
      # and reverts it to match git.
      selfHeal: true
      prune: true
    syncOptions:
      - CreateNamespace=true
