# The cutover-sensitive Application. Edits to prod/routing/live-ingress.yaml
# flip live traffic between colors in seconds. Automated sync is ON here
# (unlike blue/green) because routing changes should propagate fast —
# the merge-to-live gap should be <1 minute for rollback purposes.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: school-prod-routing
  namespace: platform-system
spec:
  project: default
  source:
    repoURL: https://github.com/Cybe-Asia/digital-school-gitops.git
    targetRevision: main
    path: prod/routing
  destination:
    server: https://kubernetes.default.svc
    namespace: school-prod-routing
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
