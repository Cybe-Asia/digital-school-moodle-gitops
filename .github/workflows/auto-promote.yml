name: auto-promote

# Cascades an image-tag bump in lab/dev/kustomization.yaml all the way
# to prod/<idle-color>/kustomization.yaml, gating on ArgoCD health
# between each step. The final routing cutover is NOT touched — a human
# still clicks merge on a prod/routing PR to move live traffic.
#
# Triggered automatically when any service CI job commits a
# "chore(...): bump lab/dev to sha-XXXX [skip ci]" to main. The
# [skip promote] tag on our own commits prevents an infinite loop.

on:
  push:
    branches: [main]
    paths:
      - 'lab/dev/kustomization.yaml'

concurrency:
  group: auto-promote
  cancel-in-progress: false

jobs:
  promote:
    if: "!contains(github.event.head_commit.message, '[skip promote]')"
    runs-on: ubuntu-latest
    permissions:
      contents: write
    timeout-minutes: 40
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          token: ${{ secrets.GITOPS_TOKEN }}
          fetch-depth: 0

      - name: Setup kustomize
        uses: imranismail/setup-kustomize@v2

      - name: Git identity
        run: |
          git config user.email "ci-bot@cybe-asia.github"
          git config user.name "CI Bot"

      - name: Helper — get ArgoCD session token
        id: argo
        run: |
          token=$(curl -sk -X POST \
            -H "Content-Type: application/json" \
            -d "{\"username\":\"${{ secrets.ARGOCD_USERNAME }}\",\"password\":\"${{ secrets.ARGOCD_PASSWORD }}\"}" \
            "${{ secrets.ARGOCD_URL }}/api/v1/session" | jq -r '.token')
          if [ -z "$token" ] || [ "$token" = "null" ]; then
            echo "::warning::Failed to get ArgoCD token; will use sleep-based waits"
            echo "have_token=false" >> "$GITHUB_OUTPUT"
          else
            echo "have_token=true" >> "$GITHUB_OUTPUT"
            echo "::add-mask::$token"
            echo "token=$token" >> "$GITHUB_OUTPUT"
          fi

      - name: Promote lab/dev → lab/test
        run: |
          set -eu
          cd lab/test
          changed=0
          while read -r image; do
            dev_tag=$(awk -v img="- name: $image$" '$0 ~ img {getline; getline; print; exit}' ../dev/kustomization.yaml | sed 's/.*newTag: //')
            if [ -n "$dev_tag" ]; then
              kustomize edit set image "${image}=${image}:${dev_tag}"
              echo "  $image → $dev_tag"
              changed=1
            fi
          done <<'EOF'
          ghcr.io/cybe-asia/admission-services
          ghcr.io/cybe-asia/auth-services
          ghcr.io/cybe-asia/digital-school-frontend
          ghcr.io/cybe-asia/notification-services
          ghcr.io/cybe-asia/otp-services
          EOF
          if [ "$changed" = "1" ] && ! git diff --quiet kustomization.yaml; then
            git add kustomization.yaml
            git commit -m "auto-promote: lab/dev → lab/test [skip promote] [skip ci]"
            git push origin main
          else
            echo "no diff — lab/test already at lab/dev digests"
          fi

      - name: Wait for school-test Healthy
        env:
          ARGOCD_URL: ${{ secrets.ARGOCD_URL }}
          ARGOCD_TOKEN: ${{ steps.argo.outputs.token }}
          HAVE_TOKEN: ${{ steps.argo.outputs.have_token }}
        run: |
          if [ "$HAVE_TOKEN" = "true" ]; then
            for i in $(seq 1 40); do
              status=$(curl -sk -H "Authorization: Bearer $ARGOCD_TOKEN" \
                "$ARGOCD_URL/api/v1/applications/school-test-services" | \
                jq -r '"\(.status.sync.status)/\(.status.health.status)"')
              echo "attempt $i: $status"
              [ "$status" = "Synced/Healthy" ] && break
              sleep 15
            done
            [ "$status" = "Synced/Healthy" ] || { echo "::error::school-test did not go Healthy"; exit 1; }
          else
            echo "no argo token, sleeping 4 minutes"
            sleep 240
          fi

      - name: Promote lab/test → lab/staging
        run: |
          set -eu
          cd lab/staging
          changed=0
          while read -r image; do
            tag=$(awk -v img="- name: $image$" '$0 ~ img {getline; getline; print; exit}' ../test/kustomization.yaml | sed 's/.*newTag: //')
            if [ -n "$tag" ]; then
              kustomize edit set image "${image}=${image}:${tag}"
              echo "  $image → $tag"
              changed=1
            fi
          done <<'EOF'
          ghcr.io/cybe-asia/admission-services
          ghcr.io/cybe-asia/auth-services
          ghcr.io/cybe-asia/digital-school-frontend
          ghcr.io/cybe-asia/notification-services
          ghcr.io/cybe-asia/otp-services
          EOF
          if [ "$changed" = "1" ] && ! git diff --quiet kustomization.yaml; then
            git add kustomization.yaml
            git commit -m "auto-promote: lab/test → lab/staging [skip promote] [skip ci]"
            git push origin main
          else
            echo "no diff — lab/staging already at lab/test digests"
          fi

      - name: Wait for school-staging Healthy (includes smoke test)
        env:
          ARGOCD_URL: ${{ secrets.ARGOCD_URL }}
          ARGOCD_TOKEN: ${{ steps.argo.outputs.token }}
          HAVE_TOKEN: ${{ steps.argo.outputs.have_token }}
        run: |
          if [ "$HAVE_TOKEN" = "true" ]; then
            for i in $(seq 1 40); do
              status=$(curl -sk -H "Authorization: Bearer $ARGOCD_TOKEN" \
                "$ARGOCD_URL/api/v1/applications/school-staging-services" | \
                jq -r '"\(.status.sync.status)/\(.status.health.status)"')
              echo "attempt $i: $status"
              [ "$status" = "Synced/Healthy" ] && break
              sleep 15
            done
            [ "$status" = "Synced/Healthy" ] || { echo "::error::school-staging smoke failed — promotion HALTED"; exit 1; }
          else
            sleep 300
          fi

      - name: Determine idle prod color
        id: color
        run: |
          live_ext=$(grep externalName prod/routing/live-ingress.yaml | head -1)
          if echo "$live_ext" | grep -q school-prod-blue; then
            echo "live=blue" >> "$GITHUB_OUTPUT"
            echo "idle=green" >> "$GITHUB_OUTPUT"
          else
            echo "live=green" >> "$GITHUB_OUTPUT"
            echo "idle=blue" >> "$GITHUB_OUTPUT"
          fi

      - name: Promote lab/staging → prod/${{ steps.color.outputs.idle }}
        run: |
          set -eu
          cd prod/${{ steps.color.outputs.idle }}
          changed=0
          while read -r image; do
            tag=$(awk -v img="- name: $image$" '$0 ~ img {getline; getline; print; exit}' ../../lab/staging/kustomization.yaml | sed 's/.*newTag: //')
            if [ -n "$tag" ]; then
              kustomize edit set image "${image}=${image}:${tag}"
              echo "  $image → $tag"
              changed=1
            fi
          done <<'EOF'
          ghcr.io/cybe-asia/admission-services
          ghcr.io/cybe-asia/auth-services
          ghcr.io/cybe-asia/digital-school-frontend
          ghcr.io/cybe-asia/notification-services
          ghcr.io/cybe-asia/otp-services
          EOF
          if [ "$changed" = "1" ] && ! git diff --quiet kustomization.yaml; then
            git add kustomization.yaml
            git commit -m "auto-promote: lab/staging → prod/${{ steps.color.outputs.idle }} [skip promote] [skip ci]"
            git push origin main
          else
            echo "no diff — prod/${{ steps.color.outputs.idle }} already at lab/staging digests"
          fi

      - name: Wait for prod/${{ steps.color.outputs.idle }} Healthy
        env:
          ARGOCD_URL: ${{ secrets.ARGOCD_URL }}
          ARGOCD_TOKEN: ${{ steps.argo.outputs.token }}
          HAVE_TOKEN: ${{ steps.argo.outputs.have_token }}
        run: |
          if [ "$HAVE_TOKEN" = "true" ]; then
            app="school-prod-${{ steps.color.outputs.idle }}-services"
            for i in $(seq 1 40); do
              status=$(curl -sk -H "Authorization: Bearer $ARGOCD_TOKEN" \
                "$ARGOCD_URL/api/v1/applications/$app" | \
                jq -r '"\(.status.sync.status)/\(.status.health.status)"')
              echo "attempt $i: $status"
              [ "$status" = "Synced/Healthy" ] && break
              sleep 15
            done
            [ "$status" = "Synced/Healthy" ] || { echo "::error::prod/${{ steps.color.outputs.idle }} did not go Healthy"; exit 1; }
          else
            sleep 300
          fi

      - name: External smoke test — idle color
        id: idle_smoke
        run: |
          color="${{ steps.color.outputs.idle }}"
          url="https://${color}.school.cybe.tech:8443/"
          for i in $(seq 1 10); do
            code=$(curl -sk --max-time 10 -o /dev/null -w "%{http_code}" "$url")
            echo "attempt $i: HTTP $code"
            [ "$code" = "200" ] || [ "$code" = "301" ] || [ "$code" = "302" ] && break
            sleep 15
          done
          [ "$code" = "200" ] || [ "$code" = "301" ] || [ "$code" = "302" ] || { echo "::error::smoke test failed on $url"; exit 1; }

      # ── AUTO-CUTOVER ───────────────────────────────────────────────
      # After the idle color is Healthy + smoke-passed, flip live
      # routing to it. Single bot-authored commit on main; Argo auto-
      # syncs prod/routing (~30s); Traefik reloads; live traffic
      # switches colors.
      - name: Auto-cutover (flip routing)
        id: cutover
        run: |
          set -eu
          current_live="${{ steps.color.outputs.live }}"
          new_live="${{ steps.color.outputs.idle }}"
          echo "flipping live: school-prod-${current_live} → school-prod-${new_live}"
          sed -i "s|school-prod-${current_live}\.svc\.cluster\.local|school-prod-${new_live}.svc.cluster.local|g" prod/routing/live-ingress.yaml
          if git diff --quiet prod/routing/live-ingress.yaml; then
            echo "::warning::routing file unchanged — cutover may have already happened"
            exit 0
          fi
          git add prod/routing/live-ingress.yaml
          git commit -m "auto-cutover: school.cybe.tech ${current_live} → ${new_live} [skip promote] [skip ci]"
          cutover_sha=$(git rev-parse HEAD)
          git push origin main
          echo "cutover_sha=${cutover_sha}" >> "$GITHUB_OUTPUT"
          echo "cutover commit: ${cutover_sha}"

      - name: Wait for Argo to sync routing
        run: |
          # school-prod-routing has auto-sync ON, takes ~30s for Traefik to reload
          sleep 45

      # ── POST-CUTOVER SOAK ─────────────────────────────────────────
      # 5 minutes of external probing + pod-health sanity checks on
      # the newly-live color. If the new color fails to serve real
      # requests, trigger the auto-rollback step below.
      - name: Post-cutover soak (5 min)
        id: soak
        env:
          ARGOCD_URL: ${{ secrets.ARGOCD_URL }}
          ARGOCD_TOKEN: ${{ steps.argo.outputs.token }}
          HAVE_TOKEN: ${{ steps.argo.outputs.have_token }}
        run: |
          set -u
          new_live="${{ steps.color.outputs.idle }}"
          live_url="https://school.cybe.tech:8443/"
          color_url="https://${new_live}.school.cybe.tech:8443/"

          http_failures=0
          argo_failures=0
          probes=20   # 20 × 15s = 5 minutes

          for i in $(seq 1 $probes); do
            live_code=$(curl -sk --max-time 10 -o /dev/null -w "%{http_code}" "$live_url" || echo "000")
            color_code=$(curl -sk --max-time 10 -o /dev/null -w "%{http_code}" "$color_url" || echo "000")

            live_ok="n"; color_ok="n"
            case "$live_code"  in 200|301|302|303) live_ok="y"  ;; esac
            case "$color_code" in 200|301|302|303) color_ok="y" ;; esac
            [ "$live_ok"  = "n" ] && http_failures=$((http_failures + 1))
            [ "$color_ok" = "n" ] && http_failures=$((http_failures + 1))

            argo_state="unknown"
            if [ "$HAVE_TOKEN" = "true" ]; then
              argo_state=$(curl -sk -H "Authorization: Bearer $ARGOCD_TOKEN" \
                "$ARGOCD_URL/api/v1/applications/school-prod-${new_live}-services" | \
                jq -r '"\(.status.sync.status)/\(.status.health.status)"')
              [ "$argo_state" != "Synced/Healthy" ] && argo_failures=$((argo_failures + 1))
            fi

            echo "probe $i/$probes  live=$live_code  ${new_live}=$color_code  argo=$argo_state  (fails http=$http_failures argo=$argo_failures)"
            sleep 15
          done

          # Acceptance: at most 3 HTTP failures (intermittent network)
          # and at most 2 Argo-state blips
          if [ "$http_failures" -gt 3 ]; then
            echo "::error::$http_failures HTTP probe failures (>3 allowed)"
            exit 1
          fi
          if [ "$argo_failures" -gt 2 ]; then
            echo "::error::$argo_failures Argo state failures (>2 allowed)"
            exit 1
          fi
          echo "soak PASSED  http_failures=$http_failures  argo_failures=$argo_failures"

      # ── AUTO-ROLLBACK ─────────────────────────────────────────────
      # Fires only if: cutover succeeded AND soak failed. Reverts the
      # cutover commit → Argo re-syncs → live traffic flips back to
      # the previous color. Idle pods (new version) keep running
      # for post-mortem.
      - name: Auto-rollback (soak failed)
        if: failure() && steps.cutover.outcome == 'success' && steps.soak.outcome == 'failure'
        run: |
          set -e
          git config user.email "ci-bot@cybe-asia.github"
          git config user.name "CI Bot"
          git revert --no-edit ${{ steps.cutover.outputs.cutover_sha }}
          git push origin main
          echo "::warning::ROLLED BACK — live traffic returned to prod-${{ steps.color.outputs.live }}. Post-mortem on prod-${{ steps.color.outputs.idle }} (idle)."

      - name: Summary (success)
        if: success()
        run: |
          cat >> "$GITHUB_STEP_SUMMARY" <<EOF
          ## ✅ Release complete — cutover succeeded

          **Live color now: prod-${{ steps.color.outputs.idle }}** (was prod-${{ steps.color.outputs.live }})

          Pipeline:
          - lab/dev ✅
          - lab/test ✅
          - lab/staging ✅ (smoke passed)
          - prod/${{ steps.color.outputs.idle }} ✅ (Synced + Healthy + smoke passed)
          - **routing cutover ✅** (\`prod/routing/live-ingress.yaml\` commit ${{ steps.cutover.outputs.cutover_sha }})
          - post-cutover soak ✅ (5 min, external HTTP + Argo health)

          prod-${{ steps.color.outputs.live }} is now idle — standby for rollback.
          Next release will deploy into prod-${{ steps.color.outputs.live }} (the new idle).
          EOF

      - name: Summary (rolled back)
        if: steps.cutover.outcome == 'success' && steps.soak.outcome == 'failure'
        run: |
          cat >> "$GITHUB_STEP_SUMMARY" <<EOF
          ## ⚠️ Release rolled back

          Cutover to prod-${{ steps.color.outputs.idle }} succeeded, but
          post-cutover soak failed. Live traffic has been reverted to
          **prod-${{ steps.color.outputs.live }}**.

          prod-${{ steps.color.outputs.idle }} pods are still running at
          the attempted new version — inspect them for root cause
          before the next retry.

          Investigation:
          - Grafana: https://grafana.cybe.tech:8443/
          - ArgoCD: https://argo.cybe.tech:8443/applications/school-prod-${{ steps.color.outputs.idle }}-services
          - Pods: \`kubectl get pods -n school-prod-${{ steps.color.outputs.idle }}\`
          EOF

      - name: Summary (halted before cutover)
        if: failure() && steps.cutover.outcome != 'success'
        run: |
          cat >> "$GITHUB_STEP_SUMMARY" <<EOF
          ## ⚠️ Pipeline halted before cutover

          Promotion failed at an earlier step — cutover did NOT happen.
          Live traffic remains on **prod-${{ steps.color.outputs.live }}** (unchanged).

          Check the failed step above for root cause. Once fixed, the
          next push to service-repo main re-runs the whole cascade.

          No manual cutover needed — auto-cutover is built in.
          EOF
