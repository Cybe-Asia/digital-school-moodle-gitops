apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: school-staging


# Moodle LMS: admissions-test engine + future student learning.
# Base at base/moodle/; overlay adds per-env ingress + sealed DB secret.
# Post-deploy one-time install (see runbooks/moodle-first-deploy.md):
#   kubectl -n <ns> exec deploy/moodle -- \
#     php /var/www/html/admin/cli/install_database.php --agree-license ...
resources:
- namespace.yaml
- ../../base/admission
- ../../base/auth
- ../../base/notification
- ../../base/otp
- ../../base/payment
- ../../base/sis-services
- ../../base/frontend
- ../../base/neo4j
- ../../base/governance
- ingress.yaml
- resource-quota.yaml
- app-config.yaml
- app-secrets-sealed.yaml
- neo4j-secret-sealed.yaml
- smoke-test-job.yaml
- unleash-frontend-token.sealed.yaml
- ../../base/moodle
- moodle-ingress.yaml
- moodle-mariadb-secret-sealed.yaml
- moodle-frontend-secret-sealed.yaml
# MinIO object store for admissions documents.
# Sealed creds live in lab/staging/minio-secret-sealed.yaml (root) and
# the scoped MINIO_ACCESS_KEY/MINIO_SECRET_KEY have been merged into
# lab/staging/app-secrets-sealed.yaml. Same shape as lab/test +
# prod/blue,green.
- ../../base/minio
- minio-secret-sealed.yaml

replicas:
- count: 2
  name: admission-service
- count: 2
  name: auth-service
- count: 2
  name: notification-service
- count: 2
  name: otp-service
- count: 2
  name: frontend

patches:
- patch: |-
    - op: replace
      path: /spec/type
      value: NodePort
    - op: add
      path: /spec/ports/0/nodePort
      value: 31090
  target:
    kind: Service
    name: admission-service
- patch: |-
    - op: replace
      path: /spec/type
      value: NodePort
    - op: add
      path: /spec/ports/0/nodePort
      value: 31093
  target:
    kind: Service
    name: auth-service
- patch: |-
    - op: replace
      path: /spec/type
      value: NodePort
    - op: add
      path: /spec/ports/0/nodePort
      value: 31092
  target:
    kind: Service
    name: notification-service
- patch: |-
    - op: replace
      path: /spec/type
      value: NodePort
    - op: add
      path: /spec/ports/0/nodePort
      value: 31094
  target:
    kind: Service
    name: otp-service
- patch: |-
    - op: replace
      path: /spec/type
      value: NodePort
    - op: add
      path: /spec/ports/0/nodePort
      value: 31095
  target:
    kind: Service
    name: frontend
- patch: |-
    # Public origin used by Next.js SSR for non-/api/leads/v1 paths
    # (auth, otp, notification, payments) — Traefik routes these to
    # the right service based on path prefix.
    - op: add
      path: /spec/template/spec/containers/0/env/-
      value:
        name: API_GATEWAY_URL
        value: "https://school-staging.cybe.tech:8443"
    - op: add
      path: /spec/template/spec/containers/0/env/-
      value:
        name: NEXT_PUBLIC_API_GATEWAY_URL
        value: "https://school-staging.cybe.tech:8443"
    # SSR bypass: the Host-aliased gateway URL above works for most
    # paths but Traefik returns 404 for /api/leads/v1/* when the pod
    # reaches it via the ClusterIP shortcut. Point SSR fetches
    # directly at the admission-service ClusterIP instead — the
    # /me, /me/sections, /me/attendance, /me/grades, /me/document-requests
    # endpoints all live under /api/leads/v1 on that service.
    - op: add
      path: /spec/template/spec/containers/0/env/-
      value:
        name: ADMISSION_SERVICE_URL
        value: "http://admission-service/api/leads/v1"
    - op: add
      path: /spec/template/spec/containers/0/env/-
      value:
        name: UNLEASH_URL
        value: "https://unleash.cybe.tech:8443/api/frontend"
    - op: add
      path: /spec/template/spec/containers/0/env/-
      value:
        name: UNLEASH_ENVIRONMENT
        # Unleash OSS restriction: map lab/staging to Unleash "development"
        # env along with dev and test. Upgrade to Pro/Enterprise to separate.
        value: "development"
    - op: add
      path: /spec/template/spec/containers/0/env/-
      value:
        name: UNLEASH_FRONTEND_TOKEN
        valueFrom:
          secretKeyRef:
            name: unleash-frontend-token
            key: token
            optional: true
  target:
    kind: Deployment
    name: frontend
- patch: |-
    - op: replace
      path: /spec/template/spec/containers/0/env/1/value
      value: https://school-staging-moodle.cybe.tech:8443
  target:
    kind: Deployment
    name: moodle
- patch: |-
    - op: add
      path: /spec/template/spec/containers/0/env/-
      value:
        name: MOODLE_INTERNAL_URL
        value: http://moodle:80
    - op: add
      path: /spec/template/spec/containers/0/env/-
      value:
        name: MOODLE_PUBLIC_URL
        value: https://school-staging-moodle.cybe.tech:8443
    - op: add
      path: /spec/template/spec/containers/0/env/-
      value:
        name: MOODLE_IIHS_COURSE_ID
        value: "2"
    - op: add
      path: /spec/template/spec/containers/0/env/-
      value:
        name: MOODLE_IIHS_QUIZ_CMID
        value: "3"
    - op: add
      path: /spec/template/spec/containers/0/env/-
      value:
        name: MOODLE_IISS_COURSE_ID
        value: "3"
    - op: add
      path: /spec/template/spec/containers/0/env/-
      value:
        name: MOODLE_IISS_QUIZ_CMID
        value: "4"
    - op: add
      path: /spec/template/spec/containers/0/env/-
      value:
        name: MOODLE_API_TOKEN
        valueFrom:
          secretKeyRef:
            name: moodle-frontend-secret
            key: MOODLE_API_TOKEN
    - op: add
      path: /spec/template/spec/containers/0/env/-
      value:
        name: MOODLE_STUDENT_PASSWORD_SALT
        valueFrom:
          secretKeyRef:
            name: moodle-frontend-secret
            key: MOODLE_STUDENT_PASSWORD_SALT
  target:
    kind: Deployment
    name: frontend
- patch: |-
    - op: add
      path: /spec/template/spec/containers/0/env/-
      value:
        name: MOODLE_INTERNAL_URL
        value: http://moodle:80
    - op: add
      path: /spec/template/spec/containers/0/env/-
      value:
        name: MOODLE_PUBLIC_URL
        value: https://school-staging-moodle.cybe.tech:8443
    - op: add
      path: /spec/template/spec/containers/0/env/-
      value:
        name: MOODLE_IIHS_COURSE_ID
        value: "2"
    - op: add
      path: /spec/template/spec/containers/0/env/-
      value:
        name: MOODLE_IISS_COURSE_ID
        value: "3"
    - op: add
      path: /spec/template/spec/containers/0/env/-
      value:
        name: MOODLE_API_TOKEN
        valueFrom:
          secretKeyRef:
            name: moodle-frontend-secret
            key: MOODLE_API_TOKEN
  target:
    kind: Deployment
    name: admission-service

images:
- name: ghcr.io/ariefnugrahaaa/payment-services
  newName: ghcr.io/ariefnugrahaaa/payment-services
  newTag: sha-446071f
- name: ghcr.io/cybe-asia/admission-services
  newName: ghcr.io/cybe-asia/admission-services
  newTag: sha-163f474
- name: ghcr.io/cybe-asia/auth-services
  newName: ghcr.io/cybe-asia/auth-services
  newTag: sha-c70a7fa
- name: ghcr.io/cybe-asia/digital-school-frontend
  newName: ghcr.io/cybe-asia/digital-school-frontend
  newTag: sha-dd31a57
- name: ghcr.io/cybe-asia/notification-services
  newName: ghcr.io/cybe-asia/notification-services
  newTag: sha-59bbf0a
- name: ghcr.io/cybe-asia/otp-services
  newName: ghcr.io/cybe-asia/otp-services
  newTag: sha-bf8101b
- name: ghcr.io/cybe-asia/sis-services
  newName: ghcr.io/cybe-asia/sis-services
  newTag: sha-1e0f891
