apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: school-staging

resources:
- namespace.yaml
- ../../base/admission
- ../../base/auth
- ../../base/notification
- ../../base/otp
- ../../base/frontend
- ../../base/neo4j
- ../../base/governance
- ingress.yaml
- resource-quota.yaml
- app-config.yaml
- app-secrets-sealed.yaml
- neo4j-secret-sealed.yaml
- smoke-test-job.yaml
- unleash-frontend-token.sealed.yaml

# Moodle LMS: admissions-test engine + future student learning.
# Base at base/moodle/; overlay adds per-env ingress + sealed DB secret.
# Post-deploy one-time install (see runbooks/moodle-first-deploy.md):
#   kubectl -n <ns> exec deploy/moodle -- \
#     php /var/www/html/admin/cli/install_database.php --agree-license ...
- ../../base/moodle
- moodle-ingress.yaml
- moodle-mariadb-secret-sealed.yaml

replicas:
- name: admission-service
  count: 2
- name: auth-service
  count: 2
- name: notification-service
  count: 2
- name: otp-service
  count: 2
- name: frontend
  count: 2

patches:
- patch: |-
    - op: replace
      path: /spec/type
      value: NodePort
    - op: add
      path: /spec/ports/0/nodePort
      value: 31090
  target:
    kind: Service
    name: admission-service
- patch: |-
    - op: replace
      path: /spec/type
      value: NodePort
    - op: add
      path: /spec/ports/0/nodePort
      value: 31093
  target:
    kind: Service
    name: auth-service
- patch: |-
    - op: replace
      path: /spec/type
      value: NodePort
    - op: add
      path: /spec/ports/0/nodePort
      value: 31092
  target:
    kind: Service
    name: notification-service
- patch: |-
    - op: replace
      path: /spec/type
      value: NodePort
    - op: add
      path: /spec/ports/0/nodePort
      value: 31094
  target:
    kind: Service
    name: otp-service
- patch: |-
    - op: replace
      path: /spec/type
      value: NodePort
    - op: add
      path: /spec/ports/0/nodePort
      value: 31095
  target:
    kind: Service
    name: frontend
- patch: |-
    - op: add
      path: /spec/template/spec/containers/0/env/-
      value:
        name: UNLEASH_URL
        value: "https://unleash.cybe.tech:8443/api/frontend"
    - op: add
      path: /spec/template/spec/containers/0/env/-
      value:
        name: UNLEASH_ENVIRONMENT
        # Unleash OSS restriction: map lab/staging to Unleash "development"
        # env along with dev and test. Upgrade to Pro/Enterprise to separate.
        value: "development"
    - op: add
      path: /spec/template/spec/containers/0/env/-
      value:
        name: UNLEASH_FRONTEND_TOKEN
        valueFrom:
          secretKeyRef:
            name: unleash-frontend-token
            key: token
            optional: true
  target:
    kind: Deployment
    name: frontend
# MOODLE_WWWROOT is the canonical URL for Moodle CLI tools.
# Live HTTP requests still read HTTP_HOST, but cron/install
# has no HTTP context and needs this fallback.
- patch: |-
    - op: replace
      path: /spec/template/spec/containers/0/env/1/value
      value: http://school-staging-moodle.cybe.tech
  target:
    kind: Deployment
    name: moodle

images:
- name: ghcr.io/cybe-asia/admission-services
  newName: ghcr.io/cybe-asia/admission-services
  newTag: dev-9ebf50f
- name: ghcr.io/cybe-asia/auth-services
  newName: ghcr.io/cybe-asia/auth-services
  newTag: dev-79341be
- name: ghcr.io/cybe-asia/digital-school-frontend
  newName: ghcr.io/cybe-asia/digital-school-frontend
  newTag: dev-09a3a9b
- name: ghcr.io/cybe-asia/notification-services
  newName: ghcr.io/cybe-asia/notification-services
  newTag: dev-a11e3e4
- name: ghcr.io/cybe-asia/otp-services
  newName: ghcr.io/cybe-asia/otp-services
  newTag: dev-e0cab3a
