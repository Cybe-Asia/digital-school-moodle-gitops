# Host-scoped to school-staging.cybe.tech. WITHOUT the `host:` field
# below this Ingress matches ANY incoming Host header (`(no host)`
# rule), turning school-staging into a cluster-wide catch-all that
# silently swallows requests intended for other hostnames. We hit
# this in 2026-04 — `school-test.cybe.tech` over plain HTTP fell
# through to this ingress and served the wrong frontend.
#
# Always include `host:` on every public-facing ingress.
# Also pinning `ingressClassName: traefik` rather than relying on
# cluster default — explicit is portable across clusters where the
# default ingress controller might be nginx or GKE Ingress.
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: school-staging-ingress
  namespace: school-staging
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: web
spec:
  ingressClassName: traefik
  rules:
    - host: school-staging.cybe.tech
      http:
        paths:
          - path: /api/v1/auth-service
            pathType: Prefix
            backend:
              service:
                name: auth-service
                port:
                  number: 80
          - path: /api/v1/googleLogin
            pathType: Prefix
            backend:
              service:
                name: auth-service
                port:
                  number: 80
          - path: /api/v1/admission-service
            pathType: Prefix
            backend:
              service:
                name: admission-service
                port:
                  number: 80
          # New admissions endpoints (parent + admin) live under
          # /api/leads/v1. Without this rule, browser-side calls to
          # those paths fall through to the frontend Service and 404.
          - path: /api/leads/v1
            pathType: Prefix
            backend:
              service:
                name: admission-service
                port:
                  number: 80
          - path: /api/v1/otp-service
            pathType: Prefix
            backend:
              service:
                name: otp-service
                port:
                  number: 80
          - path: /api/email/v1
            pathType: Prefix
            backend:
              service:
                name: notification-service
                port:
                  number: 80
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend
                port:
                  number: 80
