apiVersion: v1
kind: ConfigMap
metadata:
  name: app-config
data:
  NEO4J_URI: "neo4j://neo4j.school-staging.svc.cluster.local:7687"
  NEO4J_USER: "neo4j"
  GOOGLE_TOKENINFO_ENDPOINT: "https://oauth2.googleapis.com/tokeninfo"
  # Inter-service URLs (in-cluster DNS — each svc listens on port 80)
  AUTH_SERVICE_URL: "http://auth-service"
  NOTIFICATION_SERVICE_URL: "http://notification-service"
  # Public frontend origin. Used by admission-service for:
  #   - the EOI verification link sent in emails
  #   - the post-registration redirect after EOI submit
  #   - any other server-built absolute URL
  #
  # staging serves over plain HTTP (no :8443 LE cert hack like test).
  # When L3 lands (cert-manager wildcard via DNS-01), flip to https://.
  FRONTEND_URL: "http://school-staging.cybe.tech"
  # Transactional email via Resend (smtp.resend.com — STARTTLS on 587).
  # Requires SMTP_PASSWORD in app-secrets-sealed.yaml. Re-seal that
  # secret for the school-staging namespace with the Resend API key
  # before email-dependent flows (EOI verification, password reset)
  # will actually deliver.
  EMAIL_FROM: "no-reply@mail.cybe.tech"
  SMTP_HOST: "smtp.resend.com"
  SMTP_PORT: "587"
  SMTP_USER: "resend"
  # Payment (Xendit) — test/sandbox mode. Register webhook URL in Xendit:
  #   http://school-staging.cybe.tech/api/v1/payments/webhook/xendit
  TENANT_ID: "TENANT-001"
  XENDIT_API_URL: "https://api.xendit.co"
  XENDIT_SUCCESS_REDIRECT_URL: "http://school-staging.cybe.tech/auth/setup-account/payment/return?status=paid"
  XENDIT_FAILURE_REDIRECT_URL: "http://school-staging.cybe.tech/auth/setup-account/payment/return?status=failed"
  DEFAULT_FEE_CURRENCY: "IDR"
  DEFAULT_FEE_DUE_HOURS: "168"
  # Admin review queue allowlist — comma-separated emails that are
  # allowed to hit /admin/applications* on admission-service. Empty/unset
  # means no admins exist (every admin call returns 403).
  #
  # Two real entries for demo:
  #   - admin@cybe.tech                       — generic staff account
  #   - arief.nugrahaaa+admin@gmail.com       — Gmail +alias for testing
  #     admin role from arief's inbox without burning the bare address
  #     (which is a parent account)
  ADMIN_EMAILS: "admin@cybe.tech,arief.nugrahaaa+admin@gmail.com"
  # Object storage for admissions DocumentArtifact bytes. Same shape
  # as lab/test — in-cluster MinIO StatefulSet, scoped service-account
  # creds carried in app-secrets (MINIO_ACCESS_KEY/MINIO_SECRET_KEY).
  MINIO_ENDPOINT: "http://minio:9000"
  MINIO_BUCKET: "ds-documents"
  MINIO_REGION: "us-east-1"
