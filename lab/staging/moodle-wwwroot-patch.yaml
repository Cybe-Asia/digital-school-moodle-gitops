# Pins MOODLE_WWWROOT to the canonical public URL. Same pattern as
# lab/test — host-nginx serves :8443 with a trusted LE wildcard cert,
# and Moodle's reverseproxy=true (in base config.php) trusts the
# X-Forwarded-* chain so it doesn't 303-loop trying to canonicalise.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: moodle
spec:
  template:
    spec:
      containers:
        - name: moodle
          env:
            - name: MOODLE_WWWROOT
              value: https://school-staging-moodle.cybe.tech:8443
