---
# Cert-manager will issue school-test.cybe.tech from the in-cluster lab-ca
# ClusterIssuer. The resulting secret `school-test-tls` is referenced by
# the Ingress below so Traefik serves a cert that matches the hostname.
# (The lab-ca root must be trusted on your laptop once — see runbook.)
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: school-test-tls
  namespace: school-test
spec:
  secretName: school-test-tls
  issuerRef:
    name: lab-ca
    kind: ClusterIssuer
  commonName: school-test.cybe.tech
  dnsNames:
    - school-test.cybe.tech
  duration: 2160h   # 90d
  renewBefore: 360h # 15d
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: school-test-ingress
  namespace: school-test
  annotations:
    # Serve on both HTTP and HTTPS so Brave's auto-https upgrade stops
    # landing on Traefik's default self-signed cert.
    traefik.ingress.kubernetes.io/router.entrypoints: web,websecure
    traefik.ingress.kubernetes.io/router.tls: "true"
spec:
  ingressClassName: traefik
  tls:
    - hosts:
        - school-test.cybe.tech
      secretName: school-test-tls
  rules:
    # Host-scoped so only requests with this Host: header reach school-test
    # pods. Matches the pattern in prod/routing/live-ingress.yaml. Admin
    # steps to activate externally (DNS + nginx) are in
    # runbooks/subdomain-setup.md.
    - host: school-test.cybe.tech
      http:
        paths:
          - path: /api/v1/auth-service
            pathType: Prefix
            backend:
              service:
                name: auth-service
                port:
                  number: 80
          - path: /api/v1/googleLogin
            pathType: Prefix
            backend:
              service:
                name: auth-service
                port:
                  number: 80
          - path: /api/v1/admission-service
            pathType: Prefix
            backend:
              service:
                name: admission-service
                port:
                  number: 80
          # SIS (Student Information System) routes → sis-service
          # These must appear BEFORE the /api/leads/v1 catch-all so
          # Traefik's prefix match reaches them first. Longest prefix
          # wins; all four explicit SIS paths are longer than
          # /api/leads/v1.
          - path: /api/v1/sis-service
            pathType: Prefix
            backend:
              service:
                name: sis-service
                port:
                  number: 80
          - path: /api/leads/v1/admin/sis
            pathType: Prefix
            backend:
              service:
                name: sis-service
                port:
                  number: 80
          - path: /api/leads/v1/me/grades
            pathType: Prefix
            backend:
              service:
                name: sis-service
                port:
                  number: 80
          - path: /api/leads/v1/me/attendance
            pathType: Prefix
            backend:
              service:
                name: sis-service
                port:
                  number: 80
          - path: /api/leads/v1/me/sections
            pathType: Prefix
            backend:
              service:
                name: sis-service
                port:
                  number: 80
          - path: /api/leads/v1
            pathType: Prefix
            backend:
              service:
                name: admission-service
                port:
                  number: 80
          - path: /api/v1/otp-service
            pathType: Prefix
            backend:
              service:
                name: otp-service
                port:
                  number: 80
          - path: /api/email/v1
            pathType: Prefix
            backend:
              service:
                name: notification-service
                port:
                  number: 80
          - path: /api/v1/payments
            pathType: Prefix
            backend:
              service:
                name: payment-service
                port:
                  number: 80
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend
                port:
                  number: 80
