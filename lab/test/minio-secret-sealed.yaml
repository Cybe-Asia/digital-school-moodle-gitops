# Root credentials for the MinIO StatefulSet in school-test. Only the
# init-job and MinIO itself read this. admission-service NEVER uses
# root — it uses a scoped service account keyed into app-secrets as
# MINIO_ACCESS_KEY / MINIO_SECRET_KEY.
#
# Rotating: re-seal with a new MINIO_ROOT_PASSWORD, push, let argo
# re-create the Secret, kubectl rollout restart minio. The scoped SA
# stays valid across root rotations because it lives on-disk in MinIO.
---
apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  name: minio-secret
  namespace: school-test
spec:
  encryptedData:
    MINIO_ROOT_USER: 
    MINIO_ROOT_PASSWORD: 
  template:
    metadata:
      name: minio-secret
      namespace: school-test
    type: Opaque
