---
apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  name: app-secrets
  namespace: school-test
spec:
  encryptedData:
    JWT_SECRET: 
    NEO4J_PASSWORD: 
    SMTP_PASSWORD: 
    XENDIT_API_KEY: 
    # Lab envs use polling-only (school-*.cybe.tech isn't reachable from
    # Xendit's servers), so this token is never checked against an actual
    # webhook call. Value is literally "polling-only-no-webhook-in-lab",
    # sealed just so the SealedSecret controller can decrypt it cleanly.
    XENDIT_WEBHOOK_TOKEN: 
    # MinIO scoped service-account for admission-service uploads.
    # Only grants putObject/getObject/deleteObject on the ds-documents
    # bucket (see base/minio/init-job.yaml for the policy). Never the
    # root account — rotate root independently.
    MINIO_ACCESS_KEY: 
    MINIO_SECRET_KEY: 
  template:
    metadata:
      name: app-secrets
      namespace: school-test
    type: Opaque
