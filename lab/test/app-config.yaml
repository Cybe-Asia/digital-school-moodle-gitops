apiVersion: v1
kind: ConfigMap
metadata:
  name: app-config
data:
  NEO4J_URI: "neo4j://neo4j.school-test.svc.cluster.local:7687"
  NEO4J_USER: "neo4j"
  GOOGLE_TOKENINFO_ENDPOINT: "https://oauth2.googleapis.com/tokeninfo"
  # Inter-service URLs (in-cluster DNS — each svc listens on port 80)
  AUTH_SERVICE_URL: "http://auth-service"
  NOTIFICATION_SERVICE_URL: "http://notification-service"
  # Public frontend origin. Used by admission-service for:
  #   - the EOI verification link sent in emails
  #   - the post-registration redirect after EOI submit
  #   - any other server-built absolute URL
  #
  # Pinned to :8443 (publicly-trusted Let's Encrypt cert) so links
  # clicked from external/mobile devices show a green padlock.
  # Internal lab traffic on :443 still works (nginx serves it with
  # the lab-CA cert), but the canonical URL is :8443.
  FRONTEND_URL: "https://school-test.cybe.tech:8443"
  # Transactional email via Resend (smtp.resend.com — STARTTLS on 587)
  EMAIL_FROM: "no-reply@mail.cybe.tech"
  SMTP_HOST: "smtp.resend.com"
  SMTP_PORT: "587"
  SMTP_USER: "resend"
  # Payment (Xendit) — test/sandbox mode. Register webhook URL in Xendit:
  #   http://school-test.cybe.tech/api/v1/payments/webhook/xendit
  TENANT_ID: "TENANT-001"
  XENDIT_API_URL: "https://api.xendit.co"
  XENDIT_SUCCESS_REDIRECT_URL: "https://school-test.cybe.tech:8443/auth/setup-account/payment/return?status=paid"
  XENDIT_FAILURE_REDIRECT_URL: "https://school-test.cybe.tech:8443/auth/setup-account/payment/return?status=failed"
  DEFAULT_FEE_CURRENCY: "IDR"
  DEFAULT_FEE_DUE_HOURS: "168"
  # Admin review queue allowlist — comma-separated emails that are
  # allowed to hit /admin/applications* on admission-service. Empty/unset
  # means no admins exist (every admin call returns 403). Tighten to
  # real staff emails in prod; rotate via gitops.
  #
  # Keep this list STRICTLY staff. An account listed here is sent to
  # /admin/admissions at login and fenced out of the parent tree.
  # arief.nugrahaaa@gmail.com was previously here for dev testing but
  # moved off — that account owns a real Lead (Lavenchia) and should
  # render as a parent. For staff-role testing from that inbox, use
  # a Gmail +alias (e.g. arief.nugrahaaa+admin@gmail.com) and add
  # THE ALIAS here — not the bare address.
  ADMIN_EMAILS: "demo.parent@school-test.local,admin@school-test.local"
  # Object storage for admissions DocumentArtifact bytes. In-cluster
  # MinIO; same bucket per env, separate bucket per env in the future
  # (today each env has its own MinIO StatefulSet so just one bucket
  # is fine).
  MINIO_ENDPOINT: "http://minio:9000"
  MINIO_BUCKET: "ds-documents"
  MINIO_REGION: "us-east-1"
