  target:
    kind: Service
    name: frontend
- patch: |-
    - op: replace
      path: /spec/type
      value: NodePort
    - op: add
      path: /spec/ports/0/nodePort
      value: 31106
  target:
    kind: Service
    name: payment-service
- patch: |-
    # Resolve school-test.cybe.tech → traefik ClusterIP inside the pod so
    # the Next.js proxy sends Host: school-test.cybe.tech → traefik's ingress
    # rule for school-test-ingress matches → requests stay in this namespace.
    # (Without this the Host would be traefik.kube-system.* and traefik would
    # pick the wildcard school-dev-ingress and route to the wrong namespace.)
    - op: add
      path: /spec/template/spec/hostAliases
      value:
        - ip: "10.43.115.109"
          hostnames: ["school-test.cybe.tech"]
    - op: add
      path: /spec/template/spec/containers/0/env/-
      value:
        name: API_GATEWAY_URL
        value: "http://school-test.cybe.tech"
    - op: add
      path: /spec/template/spec/containers/0/env/-
      value:
        name: NEXT_PUBLIC_API_GATEWAY_URL
        value: "http://school-test.cybe.tech"
    # SSR bypass: the Host-aliased gateway URL above works for most
    # paths but Traefik returns 404 for /api/leads/v1/* when the pod
    # reaches it via the ClusterIP shortcut. Point SSR fetches
    # directly at the admission-service ClusterIP instead — the
    # /me, /me/sections, /me/attendance, /me/grades endpoints all
    # live under /api/leads/v1 on that service.
    - op: add
      path: /spec/template/spec/containers/0/env/-
      value:
        name: ADMISSION_SERVICE_URL
        value: "http://admission-service/api/leads/v1"
    # Feature flags (Unleash). UNLEASH_FRONTEND_TOKEN is pulled from
    # the sealed secret `unleash-frontend-token` — admin must seal the
    # token (scoped to environment=test) before the frontend pod can
    # start with flags enabled. Without the secret, frontend still
    # boots and runs in "disabled" mode, using code defaults.
    - op: add
      path: /spec/template/spec/containers/0/env/-
      value:
        name: UNLEASH_URL
        value: "https://unleash.cybe.tech:8443/api/frontend"
    - op: add
      path: /spec/template/spec/containers/0/env/-
      value:
        name: UNLEASH_ENVIRONMENT
        # Unleash OSS supports only built-in environments (development,
        # production). All lab envs (dev/test/staging) map to Unleash's
        # "development" — same flag state in Unleash flips buttons across
        # the entire lab cluster. Prod uses "production" so it's isolated.
        value: "development"
    - op: add
      path: /spec/template/spec/containers/0/env/-
      value:
        name: UNLEASH_FRONTEND_TOKEN
        valueFrom:
          secretKeyRef:
            name: unleash-frontend-token
            key: token
            optional: true
  target:
    kind: Deployment
    name: frontend
- patch: |-
    - op: replace
      path: /spec/template/spec/containers/0/env/1/value
      value: http://school-test-moodle.cybe.tech
  target:
    kind: Deployment
    name: moodle
- patch: |-
    - op: add
      path: /spec/template/spec/containers/0/env/-
      value:
