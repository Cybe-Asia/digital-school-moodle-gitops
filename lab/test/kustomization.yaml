apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: school-test

resources:
- namespace.yaml
- ../../base/admission
- ../../base/auth
- ../../base/notification
- ../../base/otp
- ../../base/frontend
- ../../base/neo4j
- ../../base/governance
- ingress.yaml
- resource-quota.yaml
- app-config.yaml
- app-secrets-sealed.yaml
- neo4j-secret-sealed.yaml

    # Feature flags (Unleash). UNLEASH_FRONTEND_TOKEN is pulled from
    # the sealed secret `unleash-frontend-token` — admin must seal the
    # token (scoped to environment=test) before the frontend pod can
    # start with flags enabled. Without the secret, frontend still
    # boots and runs in "disabled" mode, using code defaults.
    # Feature flags (Unleash). UNLEASH_FRONTEND_TOKEN is pulled from
    # the sealed secret `unleash-frontend-token` — admin must seal the
    # token (scoped to environment=test) before the frontend pod can
    # start with flags enabled. Without the secret, frontend still
    # boots and runs in "disabled" mode, using code defaults.
patches:
- patch: |-
    - op: replace
      path: /spec/type
      value: NodePort
    - op: add
      path: /spec/ports/0/nodePort
      value: 31100
  target:
    kind: Service
    name: admission-service
- patch: |-
    - op: replace
      path: /spec/type
      value: NodePort
    - op: add
      path: /spec/ports/0/nodePort
      value: 31103
  target:
    kind: Service
    name: auth-service
- patch: |-
    - op: replace
      path: /spec/type
      value: NodePort
    - op: add
      path: /spec/ports/0/nodePort
      value: 31102
  target:
    kind: Service
    name: notification-service
- patch: |-
    - op: replace
      path: /spec/type
      value: NodePort
    - op: add
      path: /spec/ports/0/nodePort
      value: 31104
  target:
    kind: Service
    name: otp-service
- patch: |-
    - op: replace
      path: /spec/type
      value: NodePort
    - op: add
      path: /spec/ports/0/nodePort
      value: 31105
  target:
    kind: Service
    name: frontend
- patch: |-
    - op: add
      path: /spec/template/spec/containers/0/env/-
      value:
        name: API_GATEWAY_URL
        value: "http://traefik.kube-system.svc.cluster.local"
    # Feature flags (Unleash). UNLEASH_FRONTEND_TOKEN is pulled from
    # the sealed secret `unleash-frontend-token` — admin must seal the
    # token (scoped to environment=test) before the frontend pod can
    # start with flags enabled. Without the secret, frontend still
    # boots and runs in "disabled" mode, using code defaults.
    - op: add
      path: /spec/template/spec/containers/0/env/-
      value:
        name: UNLEASH_URL
        value: "http://unleash.unleash.svc.cluster.local:4242/api/frontend"
    - op: add
      path: /spec/template/spec/containers/0/env/-
      value:
        name: UNLEASH_ENVIRONMENT
        value: "test"
    - op: add
      path: /spec/template/spec/containers/0/env/-
      value:
        name: UNLEASH_FRONTEND_TOKEN
        valueFrom:
          secretKeyRef:
            name: unleash-frontend-token
            key: token
            optional: true
  target:
    kind: Deployment
    name: frontend
images:
- name: ghcr.io/cybe-asia/admission-services
  newName: ghcr.io/cybe-asia/admission-services
  newTag: dev-9ebf50f
- name: ghcr.io/cybe-asia/auth-services
  newName: ghcr.io/cybe-asia/auth-services
  newTag: dev-79341be
- name: ghcr.io/cybe-asia/digital-school-frontend
  newName: ghcr.io/cybe-asia/digital-school-frontend
  newTag: sha-11ea0a5
- name: ghcr.io/cybe-asia/notification-services
  newName: ghcr.io/cybe-asia/notification-services
  newTag: dev-a11e3e4
- name: ghcr.io/cybe-asia/otp-services
  newName: ghcr.io/cybe-asia/otp-services
  newTag: dev-e0cab3a
